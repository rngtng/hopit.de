site_name: HopIt!
site_url: https://wwww.hopit.de
site_description: Swing Tanz und Jazz
site_author: Sebastian
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.superfences
  - attr_list

theme:
  name: material
  font: false
  language: de
  favicon: img/favicon.ico
  logo: img/favicon.ico

  palette:
    primary: brown
  features:
    - navigation.expand

plugins:
  - search
  - tags
  - blog
  - git-revision-date-localized:
      enable_creation_date: true

  - mkdocs-video:
      is_video: True
      video_type: ogg

hooks:
  - hooks/flatten_archive.py

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/mastodon
      link: https://social.tchncs.de/@hopit
